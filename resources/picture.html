<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OxyTheCrack - 图片分享</title>
    <link rel="icon" href="images/favicon.ico">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/animate.css">
    
    <!-- 简化版自定义样式 -->
    <style>
        :root {
            --primary-black: #0a0a0a;
            --dark-black: #000000;
            --accent-red: #dc3545;
            --text-white: #ffffff;
            --glass-bg: rgba(0, 0, 0, 0.85);
            --border-red: rgba(220, 53, 69, 0.4);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, var(--dark-black) 0%, var(--primary-black) 50%, #1a1a1a 100%);
            color: var(--text-white);
            min-height: 100vh;
            padding-top: 120px;
        }
        
        /* 导航栏样式 */
        .navbar.custom-navbar {
            background: var(--glass-bg) !important;
            backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--border-red);
            padding: 15px 0;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }
        
        .navbar-brand {
            font-weight: 800;
            font-size: 1.8rem;
            color: var(--text-white) !important;
            text-shadow: 0 0 15px var(--accent-red);
        }
        
        .nav li a {
            color: var(--text-white) !important;
            font-weight: 600;
            padding: 15px 20px !important;
        }
        
        /* 页面标题 */
        .page-header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        .page-title {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(45deg, var(--text-white), var(--accent-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* 图片网格 - 核心展示区域 */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }
        
        .image-card {
            background: var(--glass-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid var(--border-red);
            transition: all 0.3s ease;
        }
        
        .image-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-red);
        }
        
        /* 图片容器 */
        .image-container {
            height: 200px;
            overflow: hidden;
        }
        
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        
        .image-card:hover .image-container img {
            transform: scale(1.1);
        }
        
        .image-info {
            padding: 20px;
        }
        
        .image-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        /* 响应式适配 */
        @media (max-width: 768px) {
            .image-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .page-title {
                font-size: 2rem;
            }
        }
    </style>
    <!-- Font Awesome CDN for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>

<body>
    <!-- 导航栏 -->
    <div class="navbar custom-navbar navbar-fixed-top" role="navigation">
        <div class="container">
            <div class="navbar-header">
                <button class="navbar-toggle" data-toggle="collapse" data-target=".navbar-collapse">
                    <span class="icon icon-bar"></span>
                    <span class="icon icon-bar"></span>
                    <span class="icon icon-bar"></span>
                </button>
                <a href="/" class="navbar-brand">OXY<span style="color: var(--accent-red);">THE</span>CRACK</a>
            </div>
            <div class="collapse navbar-collapse">
                <ul class="nav navbar-nav navbar-right">
                    <li><a class="smoothScroll" href="/">首页</a></li>
                    <li><a class="smoothScroll" href="/picture">图片</a></li>
                    <li><a class="smoothScroll" href="/video">视频</a></li>
                    <li><a class="smoothScroll" href="/login">登录</a></li>
                    <li><a class="smoothScroll" href="/register">注册</a></li>
                </ul>
            </div>
        </div>
    </div>

    <!-- 页面主体 -->
    <div class="container">
        <!-- 页面标题 -->
        <section class="page-header">
            <h1 class="page-title animated fadeInDown">图片分享中心</h1>
        </section>

        <!-- 图片展示网格 -->
        <div class="image-grid">
            <!-- 图片卡片1 -->
            <div class="image-card animated fadeInUp">
                <div class="image-container">
                    <img src="images/pic1.jpg" alt="图片1">
                </div>
                <div class="image-info">
                    <h3 class="image-title">图片1</h3>
                </div>
            </div>

            <!-- 图片卡片2 -->
            <div class="image-card animated fadeInUp" data-wow-delay="0.1s">
                <div class="image-container">
                    <img src="images/pic2.jpg" alt="图片2">
                </div>
                <div class="image-info">
                    <h3 class="image-title">图片2</h3>
                </div>
            </div>

            <!-- 图片卡片3 -->
            <div class="image-card animated fadeInUp" data-wow-delay="0.2s">
                <div class="image-container">
                    <img src="images/pic3.jpg" alt="图片3">
                </div>
                <div class="image-info">
                    <h3 class="image-title">图片3</h3>
                </div>
            </div>

            <!-- 图片卡片4 -->
            <div class="image-card animated fadeInUp" data-wow-delay="0.3s">
                <div class="image-container">
                    <img src="images/pic4.jpg" alt="图片4">
                </div>
                <div class="image-info">
                    <h3 class="image-title">图片4</h3>
                </div>
            </div>

            <!-- 如需添加更多图片，复制上面的卡片并修改src和title即可 -->
            <!-- 
            <div class="image-card animated fadeInUp" data-wow-delay="0.4s">
                <div class="image-container">
                    <img src="images/pic5.jpg" alt="图片5">
                </div>
                <div class="image-info">
                    <h3 class="image-title">图片5</h3>
                </div>
            </div>
            -->
        </div>
    </div>

    <!-- 必要脚本 -->
    <script src="js/jquery.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/smoothscroll.js"></script>
    <script src="js/wow.min.js"></script>
    <script>
        // 初始化动画效果
        new WOW().init();
    </script>
</body>
</html>
