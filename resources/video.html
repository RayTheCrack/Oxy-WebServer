<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OxyTheCrack - 视频分享</title>
    <link rel="icon" href="images/favicon.ico">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/animate.css">
    <link rel="stylesheet" href="css/magnific-popup.css">
    <link rel="stylesheet" href="css/font-awesome.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <!-- 自定义样式 -->
    <style>
        :root {
            --primary-black: #0a0a0a;
            --dark-black: #000000;
            --accent-red: #dc3545;
            --light-red: #e74c3c;
            --deep-red: #c0392b;
            --text-white: #ffffff;
            --text-gray: #bdc3c7;
            --glass-bg: rgba(0, 0, 0, 0.85);
            --border-red: rgba(220, 53, 69, 0.4);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, var(--dark-black) 0%, var(--primary-black) 50%, #1a1a1a 100%);
            color: var(--text-white);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* 背景动画效果 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 15% 25%, rgba(220, 53, 69, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 85% 75%, rgba(231, 76, 60, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 10%, rgba(192, 57, 43, 0.08) 0%, transparent 50%);
            z-index: -1;
            animation: floating 12s infinite ease-in-out;
        }
        
        @keyframes floating {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(20px, -10px) rotate(5deg); }
            50% { transform: translate(-15px, 15px) rotate(-5deg); }
            75% { transform: translate(10px, -20px) rotate(3deg); }
        }
        
        /* 导航栏样式 */
        .navbar.custom-navbar {
            background: var(--glass-bg) !important;
            backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--border-red);
            padding: 15px 0;
            transition: all 0.3s ease;
            position: fixed;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.7);
        }
        
        .navbar-brand {
            font-weight: 800;
            font-size: 1.8rem;
            color: var(--text-white) !important;
            text-shadow: 0 0 15px var(--accent-red);
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        
        .navbar-brand span {
            color: var(--accent-red) !important;
        }
        
        .navbar-brand:hover {
            color: var(--accent-red) !important;
            transform: scale(1.05);
        }
        
        .nav li a {
            color: var(--text-white) !important;
            font-weight: 600;
            padding: 15px 20px !important;
            transition: all 0.3s ease;
        }
        
        .nav li a:hover {
            color: var(--accent-red) !important;
            background: rgba(220, 53, 69, 0.1);
        }
        
        /* 页面标题区域 */
        .page-header {
            padding: 180px 0 50px;
            text-align: center;
        }
        
        .page-title {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(45deg, var(--text-white), var(--accent-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(220, 53, 69, 0.5);
        }
        
        .page-subtitle {
            font-size: 1.3rem;
            color: var(--text-gray);
            font-weight: 300;
            margin-bottom: 40px;
        }
        
        /* 上传区域（复用图片页面样式） */
        .upload-section {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 40px;
            margin: 30px 0;
            border: 2px solid var(--border-red);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }
        
        .upload-area {
            border: 3px dashed var(--border-red);
            border-radius: 15px;
            padding: 50px 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            background: rgba(220, 53, 69, 0.05);
        }
        
        .upload-area:hover {
            border-color: var(--accent-red);
            background: rgba(220, 53, 69, 0.1);
            transform: scale(1.02);
        }
        
        .upload-area.active {
            border-color: var(--accent-red);
            background: rgba(220, 53, 69, 0.15);
        }
        
        .upload-icon {
            font-size: 4rem;
            color: var(--accent-red);
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        
        .upload-text {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-white);
        }
        
        .upload-hint {
            color: var(--text-gray);
            font-size: 1rem;
        }
        
        .file-input {
            display: none;
        }
        
        /* 视频网格样式（适配视频显示） */
        .video-section {
            padding: 50px 0;
        }
        
        .video-filters {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .filter-btn {
            background: transparent;
            border: 2px solid var(--border-red);
            color: var(--text-gray);
            padding: 12px 25px;
            margin: 0 10px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        
        .filter-btn:hover, .filter-btn.active {
            background: var(--accent-red);
            color: white;
            border-color: var(--accent-red);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(220, 53, 69, 0.3);
        }
        
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }
        
        .video-card {
            background: var(--glass-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid var(--border-red);
            transition: all 0.4s ease;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }
        
        .video-card:hover {
            transform: translateY(-15px) scale(1.03);
            border-color: var(--accent-red);
            box-shadow: 0 20px 40px rgba(220, 53, 69, 0.3);
        }
        
        .video-container {
            position: relative;
            padding-top: 56.25%; /* 16:9 比例 */
            overflow: hidden;
            background: linear-gradient(45deg, var(--accent-red), var(--light-red));
        }
        
        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.4);
            opacity: 0;
            transition: all 0.3s ease;
        }
        
        .video-card:hover .play-overlay {
            opacity: 1;
        }
        
        .play-icon {
            font-size: 4rem;
            color: white;
            text-shadow: 0 0 20px var(--accent-red);
            transform: scale(0.8);
            transition: all 0.3s ease;
        }
        
        .video-card:hover .play-icon {
            transform: scale(1);
        }
        
        .video-info {
            padding: 20px;
        }
        
        .video-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-white);
        }
        
        .video-meta {
            display: flex;
            justify-content: space-between;
            color: var(--text-gray);
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        
        .video-actions {
            display: flex;
            gap: 10px;
        }
        
        .action-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-view {
            background: linear-gradient(45deg, var(--accent-red), var(--light-red));
            color: white;
        }
        
        .btn-view:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.4);
        }
        
        .btn-delete {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-gray);
            border: 1px solid var(--text-gray);
        }
        
        .btn-delete:hover {
            background: #ff4757;
            color: white;
            border-color: #ff4757;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-gray);
        }
        
        .empty-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            color: var(--accent-red);
            opacity: 0.5;
        }
        
        .empty-text {
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
        
        .empty-subtext {
            font-size: 1.1rem;
            margin-bottom: 30px;
        }
        
        /* 进度条 */
        .upload-progress {
            margin-top: 20px;
            display: none;
        }
        
        .progress-bar {
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-red), var(--light-red));
            width: 0%;
            transition: width 0.3s ease;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .page-header {
                padding: 150px 20px 30px;
            }
            
            .page-title {
                font-size: 2.5rem;
            }
            
            .upload-section {
                padding: 25px;
                margin: 20px 10px;
            }
            
            .video-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .filter-btn {
                display: block;
                margin: 10px auto;
                width: 80%;
            }
            
            .video-container video {
                width: 100%;
                height: auto;
            }
        }
    </style>
    <!-- Font Awesome CDN for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>

<body>
    <!-- 导航栏 -->
    <div class="navbar custom-navbar navbar-fixed-top" role="navigation">
        <div class="container">
            <div class="navbar-header">
                <button class="navbar-toggle" data-toggle="collapse" data-target=".navbar-collapse">
                    <span class="icon icon-bar"></span>
                    <span class="icon icon-bar"></span>
                    <span class="icon icon-bar"></span>
                </button>
                <a href="/" class="navbar-brand">OXY<span style="color: var(--accent-red);">THE</span>CRACK</a>
            </div>
            <div class="collapse navbar-collapse">
                <ul class="nav navbar-nav navbar-right">
                    <li><a class="smoothScroll" href="/">首页</a></li>
                    <li><a class="smoothScroll" href="/picture">图片</a></li>

                    <li><a class="smoothScroll" href="/register">注册</a></li>
                </ul>
            </div>
        </div>
    </div>

    <!-- 页面主体 -->
    <div class="container">
        <!-- 页面标题 -->
        <section class="page-header">
            <h1 class="page-title animated fadeInDown">视频分享中心</h1>
            <p class="page-subtitle animated fadeInUp">上传、管理和分享您的精彩视频</p>
        </section>

        <!-- 上传区域 -->
        <section class="upload-section animated fadeInUp">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">
                    <i class="fa fa-video-camera"></i>
                </div>
                <div class="upload-text">拖拽视频到此处或点击上传</div>
                <div class="upload-hint">支持 MP4、AVI、MOV 格式，最大 100MB</div>
                <input type="file" class="file-input" id="videoFileInput" accept="video/*">
            </div>
            
            <!-- 上传进度条 -->
            <div class="upload-progress" id="uploadProgress">

                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
        </section>

        <!-- 视频展示区域 -->
        <section class="video-section">
            <!-- 筛选按钮 -->
            <div class="video-filters">
                <button class="filter-btn active">全部视频</button>
                <button class="filter-btn">我的上传</button>
                <button class="filter-btn">热门推荐</button>
                <button class="filter-btn">最新上传</button>
            </div>

            <!-- 视频网格 -->
            <div class="video-grid">
                <!-- 单个视频卡片 -->
                <div class="video-card animated fadeInUp">
                    <div class="video-container">
                        <video poster="images/video-thumbnail.jpg" preload="metadata">
                            <source src="/video/xxx.mp4" type="video/mp4">
                            您的浏览器不支持HTML5视频播放
                        </video>
                        <div class="play-overlay">
                            <i class="fa fa-play-circle play-icon"></i>
                        </div>
                    </div>
                    <div class="video-info">
                        <h3 class="video-title">测试视频标题</h3>
                        <div class="video-meta">
                            <span>2026-02-24</span>
                            <span>03:45</span>
                        </div>
                        <div class="video-actions">
                            <button class="action-btn btn-view">播放</button>

                </div>

                <!-- 可以复制多个视频卡片来展示更多视频 -->
                <div class="video-card animated fadeInUp" data-wow-delay="0.2s">
                    <div class="video-container">

                        <div class="video-meta">

    <!-- SCRIPTS -->
    <script src="js/jquery.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/smoothscroll.js"></script>
    <script src="js/jquery.magnific-popup.min.js"></script>
    <script src="js/magnific-popup-options.js"></script>
    <script src="js/wow.min.js"></script>
    <script src="js/custom.js"></script>
    
    <!-- 视频页面自定义脚本 -->
    <script>
        // 初始化WOW动画
        new WOW().init();
        
        // 上传区域交互
        const uploadArea = document.getElementById('uploadArea');
        const videoFileInput = document.getElementById('videoFileInput');
        const uploadProgress = document.getElementById('uploadProgress');
        const progressFill = document.getElementById('progressFill');
        
        // 点击上传区域触发文件选择
        uploadArea.addEventListener('click', () => {
            videoFileInput.click();
        });
        
        // 拖拽上传效果
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('active');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('active');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('active');
            
            if (e.dataTransfer.files.length) {
                videoFileInput.files = e.dataTransfer.files;
                // 这里可以添加文件上传逻辑
                simulateUpload();
            }
        });
        
        // 文件选择后模拟上传进度
        videoFileInput.addEventListener('change', () => {
            if (videoFileInput.files.length) {
                simulateUpload();
            }
        });
        
        // 模拟上传进度
        function simulateUpload() {
            uploadProgress.style.display = 'block';
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 10;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    // 上传完成后的逻辑
                    setTimeout(() => {
                        uploadProgress.style.display = 'none';
                        progressFill.style.width = '0%';
                        // 可以添加刷新视频列表的逻辑
                    }, 1000);
                }
                progressFill.style.width = `${progress}%`;
            }, 300);
        }
        
        // 筛选按钮交互
        const filterBtns = document.querySelectorAll('.filter-btn');
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                // 这里可以添加筛选逻辑
            });
        });
        
        // 视频播放按钮交互
        const playBtns = document.querySelectorAll('.btn-view');
        playBtns.forEach((btn, index) => {
            btn.addEventListener('click', () => {
                const video = document.querySelectorAll('.video-container video')[index];
                if (video.paused) {
                    video.play();
                } else {
                    video.pause();
                }
            });
        });
    </script>
</body>
</html>
