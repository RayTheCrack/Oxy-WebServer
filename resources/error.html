<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OxyTheCrack - 错误页面</title>
    <link rel="icon" href="images/favicon.ico">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/animate.css">
    <link rel="stylesheet" href="css/magnific-popup.css">
    <link rel="stylesheet" href="css/font-awesome.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <!-- 自定义样式 -->
    <style>
        :root {
            --primary-color: #8a2be2;
            --secondary-color: #4b0082;
            --accent-color: #da70d6;
            --error-color: #ff4757;
            --text-light: #f8f9fa;
            --text-dark: #212529;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 20px;
        }
        
        .error-container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        .error-header {
            margin-bottom: 40px;
        }
        
        .error-icon {
            font-size: 5rem;
            color: var(--error-color);
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .error-title {
            font-size: 2.5rem;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #fff, #ff4757);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: bold;
        }
        
        .error-message {
            font-size: 1.3rem;
            opacity: 0.9;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .error-details {
            background: rgba(255, 71, 87, 0.15);
            border-radius: 15px;
            padding: 25px;
            margin: 30px 0;
            border: 1px solid rgba(255, 71, 87, 0.3);
        }
        
        .error-code {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--error-color);
            margin-bottom: 15px;
        }
        
        .solution-list {
            text-align: left;
            margin: 25px 0;
            padding-left: 20px;
        }
        
        .solution-list li {
            margin: 10px 0;
            padding: 5px 0;
        }
        
        .btn-action {
            background: linear-gradient(45deg, var(--primary-color), var(--accent-color));
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            margin: 10px;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        
        .btn-action:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(138, 43, 226, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .btn-secondary:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .support-info {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        .navbar.custom-navbar {
            background: rgba(138, 43, 226, 0.95) !important;
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }
        
        .navbar-brand {
            font-weight: bold;
            color: white !important;
        }
        
        .contact-methods {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .contact-item {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 10px 20px;
            transition: all 0.3s ease;
        }
        
        .contact-item:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-3px);
        }
    </style>
    <!-- Font Awesome CDN for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>

<body>
    <!-- 导航栏 -->
    <div class="navbar custom-navbar navbar-fixed-top" role="navigation">
        <div class="container">
            <div class="navbar-header">
                <button class="navbar-toggle" data-toggle="collapse" data-target=".navbar-collapse">
                    <span class="icon icon-bar"></span>
                    <span class="icon icon-bar"></span>
                    <span class="icon icon-bar"></span>
                </button>
                <a href="/" class="navbar-brand">OxyTheCrack</a>
            </div>
            <div class="collapse navbar-collapse">
                <ul class="nav navbar-nav navbar-right">
                    <li><a class="smoothScroll" href="/">首页</a></li>
                    <li><a class="smoothScroll" href="/picture">图片</a></li>
                    <li><a class="smoothScroll" href="/video">视频</a></li>
                    <li><a class="smoothScroll" href="/login">登录</a></li>
                    <li><a class="smoothScroll" href="/register">注册</a></li>
                </ul>
            </div>
        </div>
    </div>

    <!-- 错误容器 -->
    <div class="container">
        <div class="error-container animated fadeInUp">
            <div class="error-header">
                <div class="error-icon">
                    <i class="fa fa-exclamation-triangle"></i>
                </div>
                <h1 class="error-title">操作失败</h1>
                <p class="error-message">抱歉，您的请求遇到了一些问题</p>
            </div>
            
            <div class="error-details">
                <div class="error-code">错误代码: AUTH-001</div>
                <p>可能的原因：</p>
                <ul class="solution-list">
                    <li><i class="fa fa-times-circle"></i> 用户名或密码不正确</li>
                    <li><i class="fa fa-times-circle"></i> 用户名已被注册</li>
                    <li><i class="fa fa-times-circle"></i> 输入格式不符合要求</li>
                    <li><i class="fa fa-times-circle"></i> 网络连接异常</li>
                </ul>
            </div>
            
            <div class="contact-methods">
                <div class="contact-item">
                    <i class="fa fa-home"></i> 返回首页
                </div>
                <div class="contact-item">
                    <i class="fa fa-question-circle"></i> 帮助中心
                </div>
                <div class="contact-item">
                    <i class="fa fa-envelope"></i> 联系客服
                </div>
            </div>
            
            <div class="error-actions">
                <a href="/" class="btn btn-action">
                    <i class="fa fa-home"></i> 返回首页
                </a>
                <a href="/login" class="btn btn-action btn-secondary">
                    <i class="fa fa-sign-in"></i> 重新登录
                </a>
                <a href="/register" class="btn btn-action btn-secondary">
                    <i class="fa fa-user-plus"></i> 用户注册
                </a>
            </div>
            
            <div class="support-info">
                <p>如果您持续遇到问题，请联系我们的技术支持团队</p>
                <p>邮箱: support@oxythecrack.com | 电话: 400-xxx-xxxx</p>
                <p style="margin-top: 15px;">© 2026 OxyTheCrack - 我们始终在这里为您提供帮助</p>
            </div>
        </div>
    </div>

    <!-- 脚本 -->
    <script src="js/jquery.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/smoothscroll.js"></script>
    <script src="js/jquery.magnific-popup.min.js"></script>
    <script src="js/magnific-popup-options.js"></script>
    <script src="js/wow.min.js"></script>
    <script src="js/custom.js"></script>
    
    <script>
        new WOW().init();
        
        // 错误页面自动刷新提示
        setTimeout(function() {
            $('.error-message').append('<br><small style="font-size: 0.8em;">页面将在10秒后自动刷新...</small>');
        }, 3000);
        
        // 10秒后自动刷新页面
        setTimeout(function() {
            location.reload();
        }, 10000);
    </script>
</body>
</html>
