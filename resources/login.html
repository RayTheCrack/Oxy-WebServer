<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OxyTheCrack - 用户登录</title>
    <link rel="icon" href="images/favicon.ico">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/animate.css">
    <link rel="stylesheet" href="css/magnific-popup.css">
    <link rel="stylesheet" href="css/font-awesome.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <!-- 自定义样式 -->
    <style>
        :root {
            --primary-black: #0a0a0a;
            --dark-black: #000000;
            --accent-red: #dc3545;
            --light-red: #e74c3c;
            --deep-red: #c0392b;
            --text-white: #ffffff;
            --text-gray: #bdc3c7;
            --glass-bg: rgba(0, 0, 0, 0.85);
            --border-red: rgba(220, 53, 69, 0.4);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, var(--dark-black) 0%, var(--primary-black) 50%, #1a1a1a 100%);
            color: var(--text-white);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            padding: 20px;
        }
        
        /* 背景动画效果 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 15% 25%, rgba(220, 53, 69, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 75%, rgba(231, 76, 60, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 30% 90%, rgba(192, 57, 43, 0.1) 0%, transparent 50%);
            z-index: -1;
            animation: matrix 10s infinite linear;
        }
        
        @keyframes matrix {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-100px) rotate(360deg); }
        }
        
        /* 导航栏样式 */
        .navbar.custom-navbar {
            background: var(--glass-bg) !important;
            backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--border-red);
            padding: 15px 0;
            transition: all 0.3s ease;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.7);
        }
        
        .navbar-brand {
            font-weight: 800;
            font-size: 1.8rem;
            color: var(--text-white) !important;
            text-shadow: 0 0 15px var(--accent-red);
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        
        .navbar-brand:hover {
            color: var(--accent-red) !important;
            transform: scale(1.05);
        }
        
        .nav li a {
            color: var(--text-white) !important;
            font-weight: 600;
            padding: 15px 20px !important;
            transition: all 0.3s ease;
        }
        
        .nav li a:hover {
            color: var(--accent-red) !important;
            background: rgba(220, 53, 69, 0.1);
        }
        
        /* 登录容器 */
        .login-wrapper {
            width: 100%;
            max-width: 500px;
            margin: 80px auto 0;
        }
        
        .login-container {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border-radius: 25px;
            padding: 50px 40px;
            border: 2px solid var(--border-red);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            position: relative;
            overflow: hidden;
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        
        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, var(--accent-red), var(--light-red), var(--deep-red));
        }
        
        /* 登录头部 */
        .login-header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }
        
        .login-logo {
            font-size: 3.5rem;
            margin-bottom: 15px;
            color: var(--accent-red);
            text-shadow: 0 0 20px var(--accent-red);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .login-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 15px;
            background: linear-gradient(45deg, var(--text-white), var(--accent-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }
        
        .login-subtitle {
            font-size: 1.1rem;
            color: var(--text-gray);
            font-weight: 300;
        }
        
        /* 表单样式 */
        .form-group {
            margin-bottom: 30px;
            position: relative;
        }
        
        .input-group {
            position: relative;
        }
        
        .input-group-addon {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 50px;
            background: linear-gradient(45deg, var(--accent-red), var(--light-red));
            border: none;
            border-radius: 12px 0 0 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            z-index: 2;
        }
        
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--border-red);
            border-radius: 12px;
            padding: 18px 20px 18px 60px;
            color: var(--text-white);
            font-size: 1.1rem;
            transition: all 0.3s ease;
            height: 60px;
        }
        
        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--accent-red);
            box-shadow: 0 0 20px rgba(220, 53, 69, 0.5);
            color: var(--text-white);
            outline: none;
        }
        
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        
        /* 登录按钮 */
        .btn-login {
            background: linear-gradient(45deg, var(--accent-red), var(--light-red));
            border: none;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 12px;
            width: 100%;
            transition: all 0.4s ease;
            letter-spacing: 2px;
            box-shadow: 0 10px 25px rgba(220, 53, 69, 0.4);
            position: relative;
            overflow: hidden;
        }
        
        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }
        
        .btn-login:hover::before {
            left: 100%;
        }
        
        .btn-login:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(220, 53, 69, 0.6);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        /* 登录底部 */
        .login-footer {
            text-align: center;
            margin-top: 35px;
            padding-top: 25px;
            border-top: 1px solid var(--border-red);
        }
        
        .login-footer p {
            margin: 10px 0;
            color: var(--text-gray);
        }
        
        .login-footer a {
            color: var(--accent-red);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .login-footer a:hover {
            color: var(--light-red);
            text-decoration: underline;
        }
        
        /* 加载动画 */
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--accent-red);
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .login-container {
                padding: 40px 30px;
                margin: 60px 20px 0;
            }
            
            .login-title {
                font-size: 1.8rem;
            }
            
            .login-logo {
                font-size: 2.5rem;
            }
            
            .form-control {
                padding: 15px 15px 15px 50px;
                height: 50px;
            }
            
            .input-group-addon {
                width: 45px;
                font-size: 1rem;
            }
        }
        
        /* 错误提示样式 */
        .error-message {
            color: #ff6b6b;
            font-size: 0.9rem;
            margin-top: 5px;
            display: none;
        }
        
        .form-control.error {
            border-color: #ff6b6b;
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.5);
        }
    </style>
    <!-- Font Awesome CDN for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>

<body>
    <!-- 导航栏 -->
    <div class="navbar custom-navbar navbar-fixed-top" role="navigation">
        <div class="container">
            <div class="navbar-header">
                <button class="navbar-toggle" data-toggle="collapse" data-target=".navbar-collapse">
                    <span class="icon icon-bar"></span>
                    <span class="icon icon-bar"></span>
                    <span class="icon icon-bar"></span>
                </button>
                <a href="/" class="navbar-brand">OXY<span style="color: var(--accent-red);">THE</span>CRACK</a>
            </div>
            <div class="collapse navbar-collapse">
                <ul class="nav navbar-nav navbar-right">
                    <li><a class="smoothScroll" href="/">首页</a></li>
                    <li><a class="smoothScroll" href="/picture">图片</a></li>
                    <li><a class="smoothScroll" href="/video">视频</a></li>
                    <li><a class="smoothScroll" href="/login">登录</a></li>
                    <li><a class="smoothScroll" href="/register">注册</a></li>
                </ul>
            </div>
        </div>
    </div>

    <!-- 登录容器 -->
    <div class="login-wrapper">
        <div class="login-container animated fadeInUp">
            <div class="login-header">
                <div class="login-logo">
                    <i class="fa fa-lock"></i>
                </div>
                <h1 class="login-title">用户登录</h1>
                <p class="login-subtitle">欢迎回到 OxyTheCrack 安全平台</p>
            </div>
            
            <form id="loginForm" action="/login" method="post">
                <div class="form-group">
                    <div class="input-group">
                        <span class="input-group-addon">
                            <i class="fa fa-user"></i>
                        </span>
                        <input type="text" name="username" id="username" class="form-control" placeholder="请输入用户名" required>
                    </div>
                    <div class="error-message" id="usernameError">请输入有效的用户名</div>
                </div>
                
                <div class="form-group">
                    <div class="input-group">
                        <span class="input-group-addon">
                            <i class="fa fa-key"></i>
                        </span>
                        <input type="password" name="password" id="password" class="form-control" placeholder="请输入密码" required>
                    </div>
                    <div class="error-message" id="passwordError">密码不能为空</div>
                </div>
                
                <button type="submit" class="btn btn-login" id="loginBtn">
                    <i class="fa fa-sign-in"></i> 安全登录
                </button>
                
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p style="margin-top: 15px; color: var(--text-gray);">正在验证身份...</p>
                </div>
            </form>
            
            <div class="login-footer">
                <p>还没有账户？ <a href="/register">立即注册</a></p>
                <p style="font-size: 0.9rem;">
                    忘记密码？请联系 <a href="mailto:support@oxythecrack.com">技术支持</a>
                </p>
                <p style="margin-top: 15px; font-size: 0.8rem; color: var(--text-gray);">
                    登录即表示您同意我们的服务条款和隐私政策
                </p>
            </div>
        </div>
    </div>

    <!-- 脚本 -->
    <script src="js/jquery.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/smoothscroll.js"></script>
    <script src="js/jquery.magnific-popup.min.js"></script>
    <script src="js/magnific-popup-options.js"></script>
    <script src="js/wow.min.js"></script>
    <script src="js/custom.js"></script>
    
    <script>
        new WOW().init();
        
        // 表单验证
        function validateForm() {
            let isValid = true;
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            // 隐藏所有错误信息
            document.querySelectorAll('.error-message').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.form-control').forEach(el => el.classList.remove('error'));
            
            // 验证用户名
            if (!username || username.length < 3) {
                document.getElementById('usernameError').style.display = 'block';
                document.getElementById('username').classList.add('error');
                isValid = false;
            }
            
            // 验证密码
            if (!password || password.length < 6) {
                document.getElementById('passwordError').style.display = 'block';
                document.getElementById('password').classList.add('error');
                isValid = false;
            }
            
            return isValid;
        }
        
        // 表单提交处理
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (validateForm()) {
                // 显示加载动画
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('loading').style.display = 'block';
                
                // 模拟登录过程
                setTimeout(() => {
                    // 这里应该发送实际的登录请求
                    // 为了演示，我们直接提交表单
                    this.submit();
                }, 2000);
            }
        });
        
        // 输入框实时验证
        document.getElementById('username').addEventListener('input', function() {
            if (this.value.trim().length >= 3) {
                this.classList.remove('error');
                document.getElementById('usernameError').style.display = 'none';
            }
        });
        
        document.getElementById('password').addEventListener('input', function() {
            if (this.value.length >= 6) {
                this.classList.remove('error');
                document.getElementById('passwordError').style.display = 'none';
            }
        });
        
        // 添加输入框焦点效果
        document.querySelectorAll('.form-control').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.parentElement.style.transform = 'scale(1.02)';
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.parentElement.style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
