
# 运行worker进程的用户，这里默认设置为用户oxythecrack
user oxythecrack; 
worker_processes auto; 
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
    use epoll;
}

http {
    # 基础设置
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志设置
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    # Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;

    # 静态资源缓存配置，需自行修改
    # 缓存路径配置（使用项目目录，确保先 mkdir -p cache/nginx_static）
    proxy_cache_path /home/oxythecrack/OneDrive/WebServer/cache/nginx_static levels=1:2 keys_zone=static_cache:100m 
                     inactive=7d max_size=1g use_temp_path=off;

    # 上游服务器配置（负载均衡）
    upstream webserver_backend {
        least_conn;  # 使用最少连接数算法
        # 在这里添加后端服务器实例
        server 127.0.0.1:9999 weight=1 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:10000 weight=1 max_fails=3 fail_timeout=30s;
        keepalive 32;  # 保持连接池
    }

    server {
        listen 80;
        server_name localhost;

        # 静态资源根目录
        # 这里需要设置为项目目录下的resources目录
        root /home/oxythecrack/OneDrive/WebServer/resources;
        index index.html;

        # 静态资源缓存配置
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;

            # 启用代理缓存
            proxy_cache static_cache;
            proxy_cache_valid 200 30d;
            proxy_cache_valid 404 1m;
            proxy_cache_key "$scheme$request_method$host$request_uri";

            # 缓存状态头
            add_header X-Cache-Status $upstream_cache_status;
        }

        # 视频文件缓存配置
        location ~* \.(mp4|avi|mov|wmv|flv|mkv)$ {
            expires 30d;
            add_header Cache-Control "public";

            # 启用代理缓存
            proxy_cache static_cache;
            proxy_cache_valid 200 30d;
            proxy_cache_key "$scheme$request_method$host$request_uri";

            # 缓存状态头
            add_header X-Cache-Status $upstream_cache_status;
        }

        # 动态请求代理到后端服务器
        location / {
            proxy_pass http://webserver_backend;

            # 代理头设置
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 代理超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # 缓冲设置
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;

            # HTTP版本
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # 健康检查端点
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # 错误页面
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
